<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agastya - AI Companion</title>
  <link rel="manifest" href="/public/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans flex flex-col h-screen max-w-md mx-auto shadow-2xl">

  <!-- Top Header -->
  <header class="bg-slate-800 p-4 border-b border-slate-700 flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-lg">A</div>
      <div>
        <h1 class="font-bold text-base">Agastya</h1>
        <p class="text-xs text-green-400">● Always Active</p>
      </div>
    </div>
  </header>

  <!-- Chat History Screen -->
  <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
    <div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl max-w-[85%] text-sm">
      👋 Hello! I am <b>Agastya</b>, your personal companion. What are we planning or accomplishing today?
    </div>
  </main>

  <!-- Message Input Bar -->
  <footer class="p-4 bg-slate-800 border-t border-slate-700">
    <form id="chat-form" class="flex space-x-2">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Ask Agastya anything..." 
        class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500"
        required
      />
      <button 
        type="submit" 
        class="bg-blue-600 hover:bg-blue-700 font-medium px-4 py-3 rounded-xl text-sm transition"
      >
        Send
      </button>
    </form>
  </footer>

  <script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');

    let chatHistory = [];

    function appendMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = role === 'user' 
        ? 'bg-blue-600 text-white p-3 rounded-2xl max-w-[85%] ml-auto text-sm'
        : 'bg-slate-800 border border-slate-700 text-slate-100 p-3 rounded-2xl max-w-[85%] text-sm';
      
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      userInput.value = '';

      // Show typing indicator
      const typingIndicator = document.createElement('div');
      typingIndicator.id = 'typing';
      typingIndicator.className = 'bg-slate-800 border border-slate-700 text-slate-400 p-3 rounded-2xl max-w-[85%] text-xs italic';
      typingIndicator.innerText = 'Agastya is thinking...';
      chatBox.appendChild(typingIndicator);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: chatHistory })
        });

        const data = await res.json();
        document.getElementById('typing')?.remove();

        if (data.reply) {
          appendMessage('model', data.reply);
          chatHistory.push({ role: 'user', content: message });
          chatHistory.push({ role: 'model', content: data.reply });
        } else {
          appendMessage('model', '⚠️ Error: ' + (data.error || 'Something went wrong.'));
        }
      } catch (err) {
        document.getElementById('typing')?.remove();
        appendMessage('model', '⚠️ Unable to connect to Agastya server.');
      }
    });
  </script>
</body>
</html>
